name: Android Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Haxe 4.2.5
      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.2.5

      # Java 11 (required for Lime 8.x)
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11

      # Android SDK
      - name: Setup Android
        uses: android-actions/setup-android@v3

      # Install required Android components
      - name: Install SDK + NDK 21
        run: |
          sdkmanager "platform-tools"
          sdkmanager "platforms;android-30"
          sdkmanager "build-tools;30.0.3"
          sdkmanager "ndk;21.4.7075529"

      # Set NDK path manually (important)
      - name: Set NDK Path
        run: echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/21.4.7075529" >> $GITHUB_ENV

      # Install Lime & OpenFL AFTER SDK is ready
      - name: Install Haxelib Dependencies
        run: |
          haxelib install lime 8.1.2 --quiet
          haxelib install openfl 9.3.3 --quiet
          haxelib run lime setup -y

      # Build APK
      - name: Build APK
        run: haxelib run lime build android -debug

      # Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TestStorageApp-APK
          path: export/android/bin/app/build/outputs/apk/debug/*.apk
