name: Android Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Haxe 4.2.5
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.2.5

      - name: Install Haxelib Dependencies
        run: |
          haxelib install lime 8.1.2
          haxelib install openfl 9.3.3
          haxelib run lime setup -y

      - name: Setup Java 11
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Licenses
        run: yes | sdkmanager --licenses

      - name: Install Android NDK 21
        run: sdkmanager "ndk;21.4.7075529"

      - name: Set NDK Path
        run: echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/21.4.7075529" >> $GITHUB_ENV

      - name: Build APK
        run: haxelib run lime build android -debug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: TestStorageApp-APK
          path: export/android/bin/app/build/outputs/apk/debug/*.apk
